<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Pricenet - Price Comparision Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css'>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Open+Sans:400,700,300,400italic,800'><link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="favicon.svg" sizes="any" type="image/svg+xml">
  <style>
    /* thin scrollbar */
::-webkit-scrollbar {
  width: 5px;
}

::-webkit-scrollbar-track {
  background: #f1f1f1;
}

::-webkit-scrollbar-thumb {
  background: #888;
}
  </style>
</head>
<body>
<!-- partial:index.partial.html -->
<div class="header">
  <div class="container-fluid">
    <a href="/">
      <img src="logo.svg" alt="logo" width="130">
    </a>
    <ul class="nav-items">
      <li><a class="sign-up" href="mailto:hello@vishok.me">Contact</a></li>
    </ul>
  </div>
</div>

<div class="jumbotron">
  <div class="container">
    <h1>Shop smarter with <span>affordable</span> deals.</h1>
    <p>Discover the <strong>best</strong> deals and <strong>compare</strong> prices for your fav product.</p>
    <form class="form-search" method="get" action="#results">
      <input id="qry" type="search" name="search" placeholder="Product Name">
      <button type="submit">SEARCH</button>
    <br />
<!--     <span class="scroll glyphicon glyphicon-chevron-down"></span> -->
  </div>
</div>
<if condition="search">
<request to="concat(env[endpoint],'/search?query=',search)" method="GET" id="resp">
  <div class="section" id="results" style="background: rgba(248, 212, 155, 0.33);">
    <if condition="arraySize(resp[results]) == 0">
      <div class="container">
        <h2 class="heading">No results found for <data id="search" eval="replace(search,'+',' ')"></data></h2>
      </div>
      <else>
        <div class="container">
          <h2 class="heading">Results for <data id="search" eval="replace(search,'+',' ')"></data></h2>
          <div class="product-grid">
            <for id="resp[results]" key="item">
              <div class="product-card">
                <if condition="item[freeDelivery] == true">
                  <div class="badge">Free Delivery</div>
                </if>
                <div class="product-tumb">
                  <img src="/logo.svg" alt="" id="thumbnail">
                </div>
                <div class="product-details">
                  <data id="seller" eval="split(item[link],'/')"></data>
                  <span class="product-catagory">
                    <data id="seller" key="2"></data>
                  </span>
                  <h4><a id="ititle"><data id="item" key="title"></data></a></h4>
                  <p><data id="item" key="desc"></data></p>
                  <div class="product-bottom-details">
                    <div class="product-price">&#x20B9;<data id="item" key="price"></data>/-</div>
                    <div class="product-links">
                      <a href=""><i class="fa fa-heart"></i></a>
                    </div>
                  </div>
                </div>
              </div>
              <attr id="thumbnail" attr="src" eval="item[img]" condition="item[img]"></attr>
              <attr id="ititle" attr="href" eval="item[link]" condition="item[link]"></attr>
            </for>
          </div>
        </div>
      </else>
    </if>
  </div>

</request>
</if>
<!-- partial -->
<script  src="./script.js"></script>

<attr id="qry" attr="value" eval="replace(search,'+',' ')" condition="search"></attr>
</body>
</html>
